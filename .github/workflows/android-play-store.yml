name: Android Play Store

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Release track"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      version_name:
        description: "New versionName (e.g. 1.1.0). Leave blank to auto-increment patch"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  publish:
    name: Build and Upload
    runs-on: ubuntu-latest
    environment: android-play-store
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -di > android/play-keystore.jks

      - name: Bump version
        if: inputs.version_name != ''
        env:
          VERSION_NAME: ${{ inputs.version_name }}
        run: |
          set -euo pipefail

          current_code=$(grep -oP 'versionCode\s*=\s*\K\d+' android/app/build.gradle.kts)
          new_code=$((current_code + 1))
          sed -i "s/versionCode = $current_code/versionCode = $new_code/" android/app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$VERSION_NAME\"/" android/app/build.gradle.kts

          echo "=== Updated version ==="
          grep -n "versionCode\|versionName" android/app/build.gradle.kts

      - name: Build signed release bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: android
        run: chmod +x gradlew && ./gradlew bundleRelease --no-daemon

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hermex.app
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed
          inAppUpdatePriority: 2
          userFraction: 0.1
          releaseName: ${{ inputs.version_name }}
