# Maintainer-only: uploads a build to the production app's external TestFlight.
# Requires the repo's APP_STORE_CONNECT_* secrets (App Store Connect API key),
# which forks and contributors do not have. Contributor CI lives in pr-ci.yml.
#
# Uses shared _testflight.yml reusable workflow for all TestFlight uploads.

name: External TestFlight

on:
  workflow_dispatch:
    inputs:
      confirm_external_review:
        description: "Type EXTERNAL_REVIEW to confirm this upload can be submitted to Beta App Review."
        required: true
        type: string
      build_number:
        description: "Optional CFBundleVersion override. Leave blank to use the next App Store Connect build number."
        required: false
        type: string

run-name: "External TestFlight from ${{ github.ref_name }}"

permissions:
  contents: read

concurrency:
  group: external-testflight
  cancel-in-progress: false

jobs:
  upload:
    name: External TestFlight Upload
    uses: ./.github/workflows/_testflight.yml
    with:
      confirm_value: ${{ inputs.confirm_external_review }}
      confirm_description: "EXTERNAL_REVIEW"
      export_options_plist: ci/ExternalTestFlightExportOptions.plist
      environment: external-testflight
      upload_label: "external-capable"
    secrets: inherit
