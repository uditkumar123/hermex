name: Auto Version Bump

on:
  push:
    branches: [ master ]

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore:')"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Determine version bump type
      id: bump
      run: |
        COMMIT_MSG="${{ github.event.head_commit.message }}"
        if echo "$COMMIT_MSG" | grep -qE "^(feat|fix|perf):.*BREAKING"; then
          echo "type=major" >> $GITHUB_OUTPUT
        elif echo "$COMMIT_MSG" | grep -q "^feat:"; then
          echo "type=minor" >> $GITHUB_OUTPUT
        else
          echo "type=patch" >> $GITHUB_OUTPUT
        fi

    - name: Bump version
      run: |
        chmod +x scripts/bump-version.ps1 || true
        
        # Read current version from build.gradle.kts
        CONTENT=$(cat android/app/build.gradle.kts)
        
        # Extract version
        VERSION_NAME=$(echo "$CONTENT" | grep -oP 'versionName\s*=\s*"\K[^"]+')
        VERSION_CODE=$(echo "$CONTENT" | grep -oP 'versionCode\s*=\s*\K\d+')
        
        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
        
        BUMP_TYPE="${{ steps.bump.outputs.type }}"
        
        case $BUMP_TYPE in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="$MAJOR.$MINOR.$PATCH"
        NEW_CODE=$((VERSION_CODE + 1))
        
        echo "Bumping version: $VERSION_NAME -> $NEW_VERSION ($VERSION_CODE -> $NEW_CODE)"
        
        # Update build.gradle.kts
        sed -i "s/versionCode = $VERSION_CODE/versionCode = $NEW_CODE/" android/app/build.gradle.kts
        sed -i "s/versionName = \"$VERSION_NAME\"/versionName = \"$NEW_VERSION\"/" android/app/build.gradle.kts

    - name: Commit version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add android/app/build.gradle.kts
        git commit -m "chore: bump version [skip ci]"
        git push
