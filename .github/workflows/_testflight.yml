name: _TestFlight Upload (Reusable)

on:
  workflow_call:
    inputs:
      confirm_value:
        required: true
        type: string
        description: "Required confirmation string (e.g. INTERNAL or EXTERNAL_REVIEW)"
      confirm_description:
        required: true
        type: string
        description: "Human-readable description of the confirmation string to show in error messages"
      export_options_plist:
        required: true
        type: string
        description: "Path to the export options plist (e.g. ci/TestFlightExportOptions.plist)"
      environment:
        required: true
        type: string
        description: "GitHub environment name for secrets (e.g. internal-testflight)"
      upload_label:
        required: true
        type: string
        description: "Human-readable label for this upload type"

permissions:
  contents: read

jobs:
  upload:
    name: Archive and Upload
    runs-on: macos-15
    environment: ${{ inputs.environment }}
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      EXPORT_OPTIONS_PLIST: ${{ inputs.export_options_plist }}
      PROJECT_PATH: HermesMobile.xcodeproj
      SCHEME: HermesMobile
      TEAM_ID: 6GYD9C9N6R

    steps:
      - name: Check manual gate
        env:
          CONFIRM_VALUE: ${{ inputs.confirm_value }}
          CONFIRM_DESCRIPTION: ${{ inputs.confirm_description }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "master" ]]; then
            echo "TestFlight uploads must be run from master. Current ref: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [[ "${CONFIRM_VALUE}" != "${CONFIRM_DESCRIPTION}" ]]; then
            echo "Re-run with the confirmation set to ${CONFIRM_DESCRIPTION}." >&2
            exit 1
          fi

      - name: Check required secrets
        run: |
          set -euo pipefail

          missing=0
          for name in APP_STORE_CONNECT_KEY_ID APP_STORE_CONNECT_ISSUER_ID APP_STORE_CONNECT_PRIVATE_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: ${name}" >&2
              missing=1
            fi
          done

          exit "${missing}"

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set output paths
        run: |
          set -euo pipefail

          {
            echo "ARCHIVE_PATH=${RUNNER_TEMP}/HermesMobile.xcarchive"
            echo "DERIVED_DATA_PATH=${RUNNER_TEMP}/DerivedData"
            echo "EXPORT_PATH=${RUNNER_TEMP}/TestFlightExport"
          } >> "${GITHUB_ENV}"

      - name: Detect marketing version
        run: |
          set -euo pipefail

          marketing_version="$(
            xcodebuild \
              -showBuildSettings \
              -project "${PROJECT_PATH}" \
              -scheme "${SCHEME}" \
              -configuration Release 2>/dev/null |
              awk -F'= ' '/MARKETING_VERSION/ { print $2; exit }'
          )"

          if [[ -z "${marketing_version}" ]]; then
            echo "Could not detect MARKETING_VERSION from Xcode build settings." >&2
            exit 1
          fi

          echo "MARKETING_VERSION=${marketing_version}" >> "${GITHUB_ENV}"
          echo "Using marketing version ${marketing_version}"

      - name: Write App Store Connect key
        run: |
          set -euo pipefail

          key_path="${RUNNER_TEMP}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          if [[ "${APP_STORE_CONNECT_PRIVATE_KEY}" == *"\\n"* ]]; then
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" | perl -pe 's/\\n/\n/g' > "${key_path}"
          else
            printf "%s" "${APP_STORE_CONNECT_PRIVATE_KEY}" > "${key_path}"
          fi
          chmod 600 "${key_path}"
          echo "APP_STORE_CONNECT_KEY_PATH=${key_path}" >> "${GITHUB_ENV}"

      - name: Select build number
        env:
          BUNDLE_ID: com.uzairansar.hermesmobile
        run: |
          set -euo pipefail

          build_number="$(ruby ci/select_testflight_build_number.rb)"
          echo "BUILD_NUMBER=${build_number}" >> "${GITHUB_ENV}"
          echo "Using build number ${build_number}"

      - name: Show upload target
        env:
          UPLOAD_LABEL: ${{ inputs.upload_label }}
        run: |
          set -euo pipefail

          echo "Uploading ${UPLOAD_LABEL} TestFlight build"
          echo "Commit SHA: ${GITHUB_SHA}"
          echo "Marketing version: ${MARKETING_VERSION}"
          echo "Build number: ${BUILD_NUMBER}"
          echo "Export options: ${EXPORT_OPTIONS_PLIST}"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          set -euo pipefail

          xcodebuild \
            -resolvePackageDependencies \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}"

      - name: Archive
        run: |
          set -euo pipefail

          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${APP_STORE_CONNECT_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_ISSUER_ID}" \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}" \
            archive

      - name: Upload to App Store Connect
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "${APP_STORE_CONNECT_KEY_PATH}" \
            -authenticationKeyID "${APP_STORE_CONNECT_KEY_ID}" \
            -authenticationKeyIssuerID "${APP_STORE_CONNECT_ISSUER_ID}"
